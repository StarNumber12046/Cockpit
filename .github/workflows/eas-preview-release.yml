name: EAS Preview Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Preview build and GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS and download artifacts
        run: node scripts/eas-github-release.mjs

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cockpit ${{ github.ref_name }}
          prerelease: true
          body_path: apps/mobile/release-assets/release-notes.md
          files: apps/mobile/release-assets/*.apk